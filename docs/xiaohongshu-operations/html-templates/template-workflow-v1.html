<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080, initial-scale=1">
  <title>aDict Xiaohongshu Workflow Template</title>
  <style>
    :root {
      --canvas-width: 1080px;
      --canvas-height: 1440px;
      --ink: #151515;
      --muted: #626a73;
      --line: #dbe1e8;
      --paper: #f8fafb;
      --panel: #ffffff;
      --accent: #ff2442;
      --blue: #2f6fbd;
      --green: #3d8b5f;
      --font: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: var(--canvas-width);
      min-height: var(--canvas-height);
      background: #e9edf2;
      font-family: var(--font);
      color: var(--ink);
    }

    .canvas {
      width: var(--canvas-width);
      height: var(--canvas-height);
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff 0%, var(--paper) 100%);
      padding: 70px 72px 62px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 40px;
    }

    .header {
      display: grid;
      gap: 18px;
      border-bottom: 2px solid var(--line);
      padding-bottom: 34px;
    }

    .kicker {
      color: var(--accent);
      font-size: 30px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 62px;
      line-height: 1.14;
      font-weight: 900;
      max-width: 930px;
    }

    .body {
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 36px;
      align-items: center;
    }

    .phone {
      height: 770px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 18px;
      overflow: hidden;
      box-shadow: 0 18px 42px rgba(31, 45, 61, 0.12);
    }

    .phone img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: top center;
      border-radius: 8px;
      display: block;
    }

    .steps {
      display: grid;
      gap: 24px;
    }

    .step {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 22px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .number {
      width: 72px;
      height: 72px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--accent);
      font-size: 34px;
      font-weight: 900;
    }

    .step h2 {
      margin: 0 0 8px;
      font-size: 36px;
      line-height: 1.25;
    }

    .step p {
      margin: 0;
      color: var(--muted);
      font-size: 28px;
      line-height: 1.45;
      font-weight: 600;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 28px;
      font-weight: 650;
    }

    .brand {
      color: var(--ink);
      font-weight: 850;
    }
  </style>
</head>
<body>
  <main class="canvas">
    <header class="header">
      <div class="kicker">aDict 工作流</div>
      <h1>把 MDict 查词变成 3 个稳定步骤</h1>
    </header>

    <section class="body">
      <figure class="phone">
        <img src="../../../assets/adict-3-mdict-lookup.png" alt="aDict MDict lookup screenshot">
      </figure>

      <div class="steps">
        <article class="step">
          <div class="number">1</div>
          <div>
            <h2>准备本地词典</h2>
            <p>把你已有的词典文件作为查词依据，而不是依赖临时搜索结果。</p>
          </div>
        </article>

        <article class="step">
          <div class="number">2</div>
          <div>
            <h2>阅读时直接查询</h2>
            <p>保留当前上下文，先得到清晰词典结果，再决定是否继续深入。</p>
          </div>
        </article>

        <article class="step">
          <div class="number">3</div>
          <div>
            <h2>再用 AI 补充解释</h2>
            <p>需要例句或语境解释时，让 AI 做补充，而不是替代原始词典。</p>
          </div>
        </article>
      </div>
    </section>

    <footer class="footer">
      <span class="brand">aDict</span>
      <span>HTML generated card · 1080 x 1440</span>
    </footer>
  </main>
</body>
</html>
